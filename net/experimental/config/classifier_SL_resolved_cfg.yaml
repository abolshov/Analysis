  cleaning:
    type: threshold
    low: -1000
    high: 2500

hyperparameters:
  num_hidden_layers: 3
  dropout: 0.2
  batch_size: 8192
  epochs: 100
  class_weights: True
  minority_class_oversampling:
    apply_oversampling: False
    sig_sampling_proba: 0.05
    bkg_sampling_proba: 0.95
    rerandomize_sampling_order: True
  output_activation: sigmoid
  output_bias: null
  classification_threshold: 0.5

multiclass: False
parametric: False

loss:
  class_name: BinaryFocalCrossentropy
  config: 
    gamma: 2.75

optimizer:
  class_name: Adam
  config:
    learning_rate: 0.0003
    clipnorm: 1.0
